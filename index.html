<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Senarai Produk Digital</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #bebdbd;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #fcf8f8;
        }
        button {
            background-color: #77f70e;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        #error-message {
            color: red;
            font-weight: bold;
            margin-bottom: 20px;
        }
        #product-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        .product-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .product-card h3 {
            margin-top: 0;
            color: #161616da;
            text-transform: capitalize;
        }
        .product-card p {
            color: #131313;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <!-- Paparan tajuk sistem pada halaman utama -->
    <h1>Sistem Senarai Produk Digital</h1>
    
    <!-- Butang "Dapatkan Produk" -->
    <button id="btn-fetch">Dapatkan Produk</button>
    
    <!-- Bekas paparan ralat sambungan -->
    <div id="error-message"></div>
    
    <!-- Bekas senarai produk -->
    <div id="product-container"></div>

    <script>
        document.getElementById('btn-fetch').addEventListener('click', fetchProducts);

        async function fetchProducts() {
            const container = document.getElementById('product-container');
            const errorDiv = document.getElementById('error-message');
            
            // Set semula paparan sebelum mengambil data baru
            container.innerHTML = '';
            errorDiv.textContent = '';

            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/posts');
                
                // Mengendalikan ralat respons jika status HTTP bukan 200-299
                if (!response.ok) {
                    throw new Error('Respons rangkaian bermasalah.');
                }

                const data = await response.json();
                
                // Sahkan struktur data menggunakan console.log() sesuai spesifikasi
                console.log('Struktur Data API:', data);

                // Paparkan Title dan Body produk
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'product-card';

                    const title = document.createElement('h3');
                    title.textContent = item.title;

                    const body = document.createElement('p');
                    body.textContent = item.body;

                    card.appendChild(title);
                    card.appendChild(body);
                    container.appendChild(card);
                });

            } catch (error) {
                // Pengendalian ralat (error handling) sekiranya berlaku masalah sambungan
                console.error('Ralat dikesan:', error);
                errorDiv.textContent = 'Masalah sambungan dikesan. Sila pastikan internet anda stabil dan cuba lagi.';
            }
        }
    </script>

</body>
</html>
